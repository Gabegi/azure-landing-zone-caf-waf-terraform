name: platform-policies

on:
  push:
    branches: [main]
    paths:
      - "platform/policies/**"
  pull_request:
    branches: [main]
    paths:
      - "platform/policies/**"

jobs:
  # ─── DEV: plan + deploy to epac-dev MG ───────────────────────────────────
  epac-dev:
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted]
    environment: EPAC-DEV

    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    defaults:
      run:
        working-directory: platform/policies

    steps:
      - uses: actions/checkout@v4

      - name: Install EPAC
        shell: pwsh
        run: Install-Module -Name EnterprisePolicyAsCode -Force -Scope CurrentUser

      - name: Login to Azure
        shell: pwsh
        run: |
          Connect-AzAccount -TenantId $env:AZURE_TENANT_ID `
            -Identity

      - name: Build dev plan
        shell: pwsh
        run: |
          Build-DeploymentPlans `
            -definitionsRootFolder "." `
            -outputFolder "./Output" `
            -pacEnvironment "epac-dev"

      - name: Deploy dev policy plan
        shell: pwsh
        run: |
          Deploy-PolicyPlan `
            -inputFolder "./Output" `
            -pacEnvironment "epac-dev"

      - name: Deploy dev roles plan
        shell: pwsh
        run: |
          Deploy-RolesPlan `
            -inputFolder "./Output" `
            -pacEnvironment "epac-dev"

  # ─── PROD: plan ───────────────────────────────────────────────────────────
  tenant-plan:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted]
    environment: TENANT-PLAN

    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    defaults:
      run:
        working-directory: platform/policies

    steps:
      - uses: actions/checkout@v4

      - name: Install EPAC
        shell: pwsh
        run: Install-Module -Name EnterprisePolicyAsCode -Force -Scope CurrentUser

      - name: Login to Azure
        shell: pwsh
        run: |
          Connect-AzAccount -TenantId $env:AZURE_TENANT_ID `
            -Identity

      - name: Build production plan
        shell: pwsh
        run: |
          Build-DeploymentPlans `
            -definitionsRootFolder "." `
            -outputFolder "./Output" `
            -pacEnvironment "tenant01"

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: epac-plan
          path: platform/policies/Output
          retention-days: 1

  # ─── PROD: deploy policies ────────────────────────────────────────────────
  tenant-deploy-policy:
    needs: tenant-plan
    runs-on: [self-hosted]
    environment: TENANT-DEPLOY-POLICY

    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    defaults:
      run:
        working-directory: platform/policies

    steps:
      - uses: actions/checkout@v4

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: epac-plan
          path: platform/policies/Output

      - name: Install EPAC
        shell: pwsh
        run: Install-Module -Name EnterprisePolicyAsCode -Force -Scope CurrentUser

      - name: Login to Azure
        shell: pwsh
        run: |
          Connect-AzAccount -TenantId $env:AZURE_TENANT_ID `
            -Identity

      - name: Deploy policy plan
        shell: pwsh
        run: |
          Deploy-PolicyPlan `
            -inputFolder "./Output" `
            -pacEnvironment "tenant01"

  # ─── PROD: deploy roles ───────────────────────────────────────────────────
  tenant-deploy-roles:
    needs: tenant-deploy-policy
    runs-on: [self-hosted]
    environment: TENANT-DEPLOY-ROLES

    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    defaults:
      run:
        working-directory: platform/policies

    steps:
      - uses: actions/checkout@v4

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: epac-plan
          path: platform/policies/Output

      - name: Install EPAC
        shell: pwsh
        run: Install-Module -Name EnterprisePolicyAsCode -Force -Scope CurrentUser

      - name: Login to Azure
        shell: pwsh
        run: |
          Connect-AzAccount -TenantId $env:AZURE_TENANT_ID `
            -Identity

      - name: Deploy roles plan
        shell: pwsh
        run: |
          Deploy-RolesPlan `
            -inputFolder "./Output" `
            -pacEnvironment "tenant01"
