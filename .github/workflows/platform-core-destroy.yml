name: platform-core-destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm you want to destroy all platform-core resources"
        required: true

jobs:
  destroy:
    runs-on: [self-hosted]
    environment: production

    env:
      ARM_USE_MSI:                      true
      ARM_TENANT_ID:                    ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID:              ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_IN_AUTOMATION:                 true
      TF_VAR_tenant_id:        ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_subscription_id:  ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    defaults:
      run:
        working-directory: platform/core

    steps:
      - name: Check confirmation
        if: github.event.inputs.confirm != 'DESTROY'
        run: |
          echo "⚠️  WARNING: You must type DESTROY to confirm. Got: '${{ github.event.inputs.confirm }}'"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build subscription associations
        run: |
          echo "TF_VAR_subscription_associations={\"conn-sub\":{\"mg_key\":\"connectivity\",\"sub_id\":\"${{ secrets.SUB_ID_CONNECTIVITY }}\",\"level\":3},\"mgmt-sub\":{\"mg_key\":\"management\",\"sub_id\":\"${{ secrets.SUB_ID_MANAGEMENT }}\",\"level\":3},\"idty-sub\":{\"mg_key\":\"identity\",\"sub_id\":\"${{ secrets.SUB_ID_IDENTITY }}\",\"level\":3},\"sec-sub\":{\"mg_key\":\"security\",\"sub_id\":\"${{ secrets.SUB_ID_SECURITY }}\",\"level\":3}}" >> $GITHUB_ENV

      - name: Azure login
        uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform destroy
        run: terraform destroy -auto-approve -no-color -input=false
